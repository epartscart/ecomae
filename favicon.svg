<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<style>
		:root {
			--epc-red: #dc2626;
			--epc-dark: #111827;
			--epc-white: #ffffff;
		}
		.speed {
			animation: speedMove 1.25s ease-in-out infinite;
			fill: none;
			opacity: .9;
			stroke: var(--epc-red);
			stroke-linecap: round;
			stroke-width: 3.8;
		}
		.speed.two { animation-delay: .15s; opacity: .65; }
		.cart {
			animation: cartDrive 1.25s ease-in-out infinite;
			transform-box: fill-box;
			transform-origin: center;
		}
		.wheel {
			animation: wheelRoll .55s linear infinite;
			transform-box: fill-box;
			transform-origin: center;
		}
		.gear {
			animation: gearSpin 1.8s linear infinite;
			transform-box: fill-box;
			transform-origin: center;
		}
		@keyframes speedMove {
			0%, 100% { transform: translateX(0); opacity: .45; }
			50% { transform: translateX(-5px); opacity: 1; }
		}
		@keyframes cartDrive {
			0%, 100% { transform: translateX(-1px) translateY(0); }
			50% { transform: translateX(2px) translateY(1px); }
		}
		@keyframes wheelRoll {
			to { transform: rotate(360deg); }
		}
		@keyframes gearSpin {
			to { transform: rotate(360deg); }
		}
		@media (prefers-reduced-motion: reduce) {
			.speed,
			.cart,
			.wheel,
			.gear {
				animation: none;
			}
		}
	</style>
	<rect width="64" height="64" rx="14" fill="#fff"/>
	<path class="speed" d="M7 21h15"/>
	<path class="speed two" d="M4 33h18"/>
	<g class="cart">
		<path d="M18 16h33c2.8 0 4.7 2.6 3.9 5.3L50 39H25L18 16Z" fill="none" stroke="#dc2626" stroke-linejoin="round" stroke-width="5.5"/>
		<path d="M18 16h-7l-4-5" fill="none" stroke="#dc2626" stroke-linecap="round" stroke-linejoin="round" stroke-width="5.5"/>
		<path d="M25 25h22l-3 9H28Z" fill="#dc2626"/>
		<g class="gear" transform="translate(38 29)">
			<path d="M0-8 2-5 6-6 7-2 10 0 7 3 6 7 2 6 0 9-3 6-7 7-8 3-10 0-8-2-7-6-3-5Z" fill="#fff"/>
			<circle r="3" fill="#dc2626"/>
		</g>
		<g transform="translate(27 48)">
			<g class="wheel">
				<circle r="8" fill="#dc2626"/>
				<circle r="4.4" fill="#fff"/>
				<path d="M0-4.4v8.8M-4.4 0h8.8M-3.1-3.1l6.2 6.2M3.1-3.1l-6.2 6.2" fill="none" stroke="#dc2626" stroke-linecap="round" stroke-width="1.25"/>
			</g>
		</g>
		<g transform="translate(50 48)">
			<g class="wheel">
				<circle r="8" fill="#dc2626"/>
				<circle r="4.4" fill="#fff"/>
				<path d="M0-4.4v8.8M-4.4 0h8.8M-3.1-3.1l6.2 6.2M3.1-3.1l-6.2 6.2" fill="none" stroke="#dc2626" stroke-linecap="round" stroke-width="1.25"/>
			</g>
		</g>
	</g>
</svg>
