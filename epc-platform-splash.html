<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Loading — Please wait</title>
<meta http-equiv="refresh" content="10">
<style>
:root{--bg:#070b14;--card:#111827;--text:#f1f5f9;--muted:#94a3b8;--accent:#38bdf8}
*{box-sizing:border-box}html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.card{text-align:center;max-width:420px;background:var(--card);border-radius:16px;padding:3rem 2rem;box-shadow:0 25px 50px rgba(0,0,0,.4)}
h1{font-size:1.4rem;margin-bottom:.75rem}
p{color:var(--muted);line-height:1.6;margin:0}
.bar{width:100%;height:4px;background:#334155;border-radius:2px;overflow:hidden;margin:1.5rem 0}
.bar span{display:block;width:30%;height:100%;background:linear-gradient(90deg,var(--accent),#8b5cf6);border-radius:2px;animation:load 1.5s ease-in-out infinite}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.hint{font-size:.8rem;color:#64748b;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
<h1>Loading your store...</h1>
<p>The page is warming up. It will reload automatically in a few seconds.</p>
<div class="bar"><span></span></div>
<p class="hint">This only happens after a server update. Normal browsing is not affected.</p>
</div>
<script>
// Simple countdown reload — no redirect logic, no loops.
// The meta-refresh already handles the reload; this just provides a faster retry.
(function(){
  var delay = 10000;
  setTimeout(function(){ location.reload(); }, delay);
})();
</script>
</body>
</html>
