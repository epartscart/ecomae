<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ecomae CP — offline</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
      color: #e5e7eb;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 16px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; color: #fff; }
    p { font-size: 14px; line-height: 1.6; color: #9ca3af; margin: 0 0 20px; }
    button {
      background: #4f46e5; color: #fff; border: 0; border-radius: 10px;
      padding: 12px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📦</div>
    <h1>You're offline</h1>
    <p>The Control Panel needs a connection to load live data. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
