<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="Animated engine piston">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="900" height="560" rx="30" fill="url(#bg)"/>
  <circle cx="150" cy="125" r="150" fill="#ef4444" opacity="0.18"/>
  <circle cx="770" cy="95" r="190" fill="#2563eb" opacity="0.16"/>
  <path d="M0 435 C170 360 275 470 450 398 C625 327 720 395 900 330 L900 560 L0 560 Z" fill="#0b1220" opacity="0.78"/>

  <g opacity="0.32">
    <line x1="20" y1="80" x2="880" y2="80" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 24">
      <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="480" x2="880" y2="480" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 24">
      <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(90 64)">
      <rect x="80" y="70" width="540" height="350" rx="34" fill="#111827" stroke="#334155" stroke-width="9"/>
      <rect x="108" y="98" width="484" height="294" rx="26" fill="#1f2937" stroke="#475569" stroke-width="5"/>
      <rect x="145" y="122" width="130" height="224" rx="22" fill="#020617" stroke="#64748b" stroke-width="6"/>
      <rect x="285" y="122" width="130" height="224" rx="22" fill="#020617" stroke="#64748b" stroke-width="6"/>
      <rect x="425" y="122" width="130" height="224" rx="22" fill="#020617" stroke="#64748b" stroke-width="6"/>

      <g transform="translate(210 178)">
        <animateTransform attributeName="transform" type="translate" values="210 178;210 242;210 178" dur="1.05s" repeatCount="indefinite"/>
        <rect x="-44" y="-28" width="88" height="70" rx="14" fill="url(#metal)" stroke="#e5e7eb" stroke-width="4"/>
        <rect x="-36" y="-14" width="72" height="8" rx="4" fill="#334155"/>
        <rect x="-36" y="4" width="72" height="8" rx="4" fill="#334155"/>
        <line x1="0" y1="42" x2="0" y2="160" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round"/>
      </g>
      <g transform="translate(350 242)">
        <animateTransform attributeName="transform" type="translate" values="350 242;350 178;350 242" dur="1.05s" repeatCount="indefinite"/>
        <rect x="-44" y="-28" width="88" height="70" rx="14" fill="url(#metal)" stroke="#e5e7eb" stroke-width="4"/>
        <rect x="-36" y="-14" width="72" height="8" rx="4" fill="#334155"/>
        <rect x="-36" y="4" width="72" height="8" rx="4" fill="#334155"/>
        <line x1="0" y1="42" x2="0" y2="160" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round"/>
      </g>
      <g transform="translate(490 178)">
        <animateTransform attributeName="transform" type="translate" values="490 178;490 242;490 178" dur="1.05s" repeatCount="indefinite"/>
        <rect x="-44" y="-28" width="88" height="70" rx="14" fill="url(#metal)" stroke="#e5e7eb" stroke-width="4"/>
        <rect x="-36" y="-14" width="72" height="8" rx="4" fill="#334155"/>
        <rect x="-36" y="4" width="72" height="8" rx="4" fill="#334155"/>
        <line x1="0" y1="42" x2="0" y2="160" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round"/>
      </g>

      <g transform="translate(350 392)">
        <circle cx="0" cy="0" r="58" fill="#020617" stroke="#94a3b8" stroke-width="12"/>
        <circle cx="0" cy="0" r="17" fill="#e5e7eb"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="1.05s" repeatCount="indefinite"/>
          <rect x="-8" y="-52" width="16" height="104" rx="8" fill="#cbd5e1"/>
          <rect x="-52" y="-8" width="104" height="16" rx="8" fill="#cbd5e1"/>
        </g>
      </g>

      <path d="M622 152 C710 145 760 188 780 250 C806 330 750 392 662 392" fill="none" stroke="#ef4444" stroke-width="24" stroke-linecap="round" opacity="0.85">
        <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="1.05s" repeatCount="indefinite"/>
      </path>
      <path d="M650 176 C708 183 742 214 756 258" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" values="1 90;70 20;1 90" dur="1.05s" repeatCount="indefinite"/>
      </path>

      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;14 -8;0 0" dur="1.05s" repeatCount="indefinite"/>
        <circle cx="666" cy="285" r="13" fill="#f97316"/>
        <circle cx="704" cy="318" r="8" fill="#facc15"/>
        <circle cx="692" cy="238" r="10" fill="#ef4444"/>
      </g>
    </g>
  </g>

  <g opacity="0.78">
    <text x="42" y="505" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Piston power inside the engine</text>
    <text x="42" y="532" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="16">Moving pistons, crankshaft rotation and ignition pulse loop continuously</text>
  </g>
</svg>
