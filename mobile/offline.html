<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline — ecomae</title>
<style>
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#16224a 0%,#0b1020 60%);color:#e7ecff}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{max-width:380px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:18px;padding:32px;backdrop-filter:blur(10px)}
  .dot{width:54px;height:54px;border-radius:50%;margin:0 auto 16px;
    background:linear-gradient(135deg,#2ee6a6,#1f8fff);box-shadow:0 0 24px rgba(46,230,166,.45)}
  h1{font-size:20px;margin:0 0 8px}p{opacity:.75;font-size:14px;line-height:1.5;margin:0 0 18px}
  button{background:linear-gradient(135deg,#2ee6a6,#1f8fff);border:0;color:#04122a;font-weight:600;
    padding:12px 22px;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
  <div class="wrap"><div class="card">
    <div class="dot"></div>
    <h1>You're offline</h1>
    <p>This view isn't cached yet. Reconnect and we'll load your latest ERP data automatically.</p>
    <button onclick="location.reload()">Retry</button>
  </div></div>
</body>
</html>
